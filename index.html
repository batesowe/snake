<!DOCTYPE html>
<html>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<head>
    <title>SNAKE</title>
    <link rel="stylesheet" href="style.css">
</head>

<div id="pauseMenu" class="hidden">
    <h1>PAUSED</h1>
    <button id="resumeBtn">RESUME</button>
    <button id="newGameBtn">NEW GAME</button>
</div>

<body>
    <canvas id="gameCanvas"></canvas>
    <div id="menu">

        <div id="mainMenu">
            <h1>SNAKE</h1>
            <button id="startBtn">START</button>
            <button id="settingsBtn">SETTINGS</button>
        </div>

        <div id="settingsMenu" class="hidden">

            <p>APPLES</p>
            <div class="options">
                <button class="opt active" data-apples="1">1</button>
                <button class="opt" data-apples="3">3</button>
                <button class="opt" data-apples="5">5</button>
                <button class="opt" data-apples="10">10</button>
                <button class="opt" data-apples="50">50</button>
            </div>

            <p>GRID SIZE</p>
            <div class="options">
                <button class="opt" data-grid="8">8x8</button>
                <button class="opt active" data-grid="12">12x12</button>
                <button class="opt" data-grid="16">16x16</button>
            </div>

            <button id="backBtn">CLOSE</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
